<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Open in Impromptu</title>

  <style>
    :root {
      --page-bg: #070522;
      --page-bg-2: #0c0730;

      --card-bg: rgba(10, 7, 42, 0.72);
      --card-border: rgba(151, 132, 255, 0.18);

      --text-primary: #f4f2ff;
      --text-secondary: #aaa3c7;
      --text-muted: #817a9e;

      --button-bg: #9d82f4;
      --button-text: #28195d;
      --button-secondary-bg: rgba(157, 130, 244, 0.14);
      --button-secondary-text: #d8cffc;

      --opa-gold: #e7b74d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page-bg);
      color: var(--text-primary);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "SF Pro Text",
        system-ui,
        sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 8%, rgba(75, 63, 164, 0.22), transparent 34%),
        radial-gradient(circle at 50% 72%, rgba(82, 54, 164, 0.12), transparent 42%),
        linear-gradient(180deg, #100b3d 0%, var(--page-bg) 58%, #09051f 100%);
    }

    .page {
      position: relative;
      min-height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 38px 22px;
      overflow: hidden;
      isolation: isolate;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
      pointer-events: none;
      z-index: -2;
    }

    .page::after {
      content: "";
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 999px;
      background: rgba(114, 91, 255, 0.08);
      filter: blur(90px);
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: -1;
    }

    .shell {
      width: min(100%, 430px);
      min-height: calc(100vh - 76px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 58px;
    }

    .brand-top {
      margin-bottom: 58px;
      color: rgba(244, 242, 255, 0.68);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.42em;
      text-align: center;
    }

    .invite-card {
      width: 100%;
      max-width: 340px;
      padding: 38px 32px 34px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(12, 8, 45, 0.78), rgba(8, 5, 35, 0.84));
      border: 1px solid var(--card-border);
      box-shadow:
        0 24px 54px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    h1 {
      margin: 0;
      max-width: 275px;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: -0.055em;
      font-weight: 800;
      color: var(--text-primary);
    }

    .subtitle {
      margin: 22px 0 28px;
      max-width: 275px;
      font-size: 19px;
      line-height: 1.45;
      letter-spacing: -0.03em;
      color: var(--text-secondary);
    }

    .details {
      display: grid;
      gap: 14px;
      margin: 0 0 24px;
      padding: 16px 0 0;
      border-top: 1px solid rgba(151, 132, 255, 0.14);
    }

    .preview-detail {
      display: grid;
      gap: 4px;
    }

    .detail-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(244, 242, 255, 0.46);
    }

    .detail-value {
      font-size: 16px;
      line-height: 1.45;
      color: var(--text-primary);
    }

    .action-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .button {
      width: 100%;
      min-height: 64px;
      border: 0;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 13px;
      padding: 18px 20px;
      background: var(--button-bg);
      color: var(--button-text);
      text-decoration: none;
      font-size: 19px;
      line-height: 1;
      font-weight: 750;
      letter-spacing: -0.025em;
      box-shadow:
        0 8px 18px rgba(25, 12, 77, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transition:
        transform 150ms ease,
        background 150ms ease,
        box-shadow 150ms ease;
      cursor: pointer;
    }

    .button.secondary {
      background: var(--button-secondary-bg);
      color: var(--button-secondary-text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.055);
    }

    .button:active {
      transform: scale(0.985);
      background: #9277e8;
      box-shadow:
        0 4px 10px rgba(25, 12, 77, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .button.secondary:active {
      background: rgba(157, 130, 244, 0.18);
    }

    .button[disabled] {
      opacity: 0.72;
      cursor: wait;
    }

    .button svg {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .join-section {
      margin-top: 18px;
      padding: 18px 0 0;
      border-top: 1px solid rgba(151, 132, 255, 0.14);
      display: grid;
      gap: 12px;
    }

    .join-label {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-secondary);
    }

    .join-input {
      width: 100%;
      min-height: 52px;
      border: 1px solid rgba(151, 132, 255, 0.24);
      border-radius: 12px;
      padding: 14px 16px;
      background: rgba(4, 2, 25, 0.5);
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
    }

    .join-input:focus {
      border-color: rgba(157, 130, 244, 0.7);
      box-shadow: 0 0 0 3px rgba(157, 130, 244, 0.16);
    }

    .join-message {
      margin: 0;
      font-size: 15px;
      line-height: 1.45;
      color: var(--text-muted);
    }

    .join-message.error {
      color: #ffb5b5;
    }

    .join-message.success {
      color: #d8f4df;
    }

    .debug-status {
      margin: 0;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(244, 242, 255, 0.54);
      word-break: break-word;
    }

    .note {
      margin-top: 28px;
      width: 100%;
      padding: 22px 21px;
      border-radius: 10px;
      border: 1px solid rgba(151, 132, 255, 0.12);
      background: rgba(5, 3, 28, 0.2);
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 14px;
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.45;
      letter-spacing: -0.02em;
    }

    .note svg {
      width: 20px;
      height: 20px;
      color: rgba(157, 130, 244, 0.72);
      margin-top: 1px;
    }

    .footer {
      margin-top: auto;
      padding-top: 84px;
      text-align: center;
    }

    .opa-link {
      position: relative;
      display: inline-block;
      color: var(--opa-gold);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-decoration: none;
      padding: 10px 2px;
      transition:
        opacity 150ms ease,
        transform 150ms ease;
    }

    .opa-link::after {
      content: "";
      position: absolute;
      left: 2px;
      right: calc(2px + 0.22em);
      bottom: 6px;
      height: 1px;
      background: currentColor;
      opacity: 0.24;
      transform: scaleX(0.42);
      transform-origin: center;
      transition:
        opacity 150ms ease,
        transform 150ms ease;
    }

    .opa-link:hover::after,
    .opa-link:focus-visible::after {
      opacity: 0.42;
      transform: scaleX(0.72);
    }

    .opa-link:active {
      opacity: 0.78;
      transform: scale(0.985);
    }

    .opa-link:focus-visible {
      outline: 1px solid rgba(231, 183, 77, 0.55);
      outline-offset: 7px;
      border-radius: 999px;
    }

    @media (max-width: 390px) {
      .page {
        padding: 0;
      }

      .shell {
        width: 100%;
        min-height: 100vh;
        padding: 54px 24px 52px;
      }

      .brand-top {
        margin-bottom: 56px;
      }

      .invite-card {
        max-width: 320px;
        padding: 36px 30px 32px;
      }

      h1 {
        font-size: 33px;
      }

      .subtitle {
        font-size: 18px;
      }

      .footer {
        padding-top: 74px;
      }
    }

    @media (max-width: 340px) {
      .invite-card {
        padding: 32px 26px 30px;
      }

      h1 {
        font-size: 30px;
      }

      .subtitle,
      .button {
        font-size: 17px;
      }

      .note {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="shell" aria-label="Impromptu invite landing page">
      <div class="brand-top">IMPROMPTU</div>

      <div class="invite-card">
        <h1 id="previewTitle">You&rsquo;ve been invited to a hangout.</h1>

        <p class="subtitle" id="previewSubtitle">
          Open Impromptu to see the details and join if you&rsquo;d like.
        </p>

        <div class="details" id="previewDetails" hidden>
          <div class="preview-detail">
            <span class="detail-label">When</span>
            <div class="detail-value" id="previewTime">—</div>
          </div>
          <div class="preview-detail">
            <span class="detail-label">Where</span>
            <div class="detail-value" id="previewDestination">—</div>
          </div>
        </div>

        <div class="action-stack">
          <a class="button" id="openButton" href="#">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M14 4h6v6M20 4l-9 9"
                stroke="currentColor"
                stroke-width="2.15"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M11 5H7.2C5.43 5 4 6.43 4 8.2v8.6C4 18.57 5.43 20 7.2 20h8.6c1.77 0 3.2-1.43 3.2-3.2V13"
                stroke="currentColor"
                stroke-width="2.15"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>

            <span>Open in Impromptu</span>
          </a>

          <a class="button secondary" id="mapsButton" href="#" hidden>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M9 4.5 3 6.5v13l6-2 6 2 6-2v-13l-6 2-6-2Z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <path d="M9 4.5v13" stroke="currentColor" stroke-width="1.8" />
              <path d="M15 6.5v13" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Open in Maps</span>
          </a>
        </div>

        <div class="join-section" id="joinSection" hidden>
          <label class="join-label" for="displayNameInput">Display name</label>
          <input
            class="join-input"
            id="displayNameInput"
            name="displayName"
            type="text"
            maxlength="40"
            autocomplete="nickname"
            placeholder="Your name"
          />
          <button class="button" id="joinButton" type="button">Join</button>
          <p class="join-message" id="joinMessage" role="status"></p>
          <p class="debug-status" id="debugStatus" hidden></p>
        </div>

        <div class="note" id="inviteNote" role="status">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 8v5"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
            <path
              d="M12 16.8h.01"
              stroke="currentColor"
              stroke-width="2.8"
              stroke-linecap="round"
            />
            <circle
              cx="12"
              cy="12"
              r="9"
              stroke="currentColor"
              stroke-width="1.8"
            />
          </svg>

          <div id="noteContent">
            If the app doesn&rsquo;t open, make sure Impromptu is installed on your device.
          </div>
        </div>
      </div>

      <footer class="footer">
        <a class="opa-link" href="https://onepartanalog.com/" aria-label="Visit One Part Analog">
          One Part Analog
        </a>
      </footer>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";

    const openButton = document.getElementById("openButton");
    const mapsButton = document.getElementById("mapsButton");
    const previewTitle = document.getElementById("previewTitle");
    const previewSubtitle = document.getElementById("previewSubtitle");
    const previewDetails = document.getElementById("previewDetails");
    const previewTime = document.getElementById("previewTime");
    const previewDestination = document.getElementById("previewDestination");
    const joinSection = document.getElementById("joinSection");
    const displayNameInput = document.getElementById("displayNameInput");
    const joinButton = document.getElementById("joinButton");
    const joinMessage = document.getElementById("joinMessage");
    const debugStatus = document.getElementById("debugStatus");
    const noteContent = document.getElementById("noteContent");

    const pathParts = window.location.pathname.split("/").filter(Boolean);
    const pathHangoutId = pathParts[pathParts.length - 1];

    const searchParams = new URLSearchParams(window.location.search);
    const queryHangoutId = searchParams.get("id");
    const inviteToken = searchParams.get("invite");
    const hangoutId = queryHangoutId || pathHangoutId;
    const firebaseConfig = window.firebaseConfig || window.IMPROMPTU_FIREBASE_CONFIG || null;
    const functionsRegion = "us-central1";
    const debugModeEnabled = new URLSearchParams(window.location.search).get("debug") === "1";

    let auth = null;
    let functions = null;
    let database = null;

    function setNote(message) {
      noteContent.textContent = message;
    }

    function setJoinMessage(message, isError = false) {
      joinMessage.textContent = message;
      joinMessage.classList.toggle("error", isError);
      joinMessage.classList.toggle("success", !isError && message.length > 0);
    }

    function setDebugStatus(code, message) {
      if (!debugModeEnabled) {
        debugStatus.hidden = true;
        debugStatus.textContent = "";
        return;
      }

      debugStatus.hidden = false;
      debugStatus.textContent = `Debug: ${code}${message ? ` — ${message}` : ""}`;
    }

    function setOpenAppLink() {
      if (hangoutId && hangoutId !== "hangout") {
        const appUrl = `impromptu://hangout/${encodeURIComponent(hangoutId)}`;

        openButton.setAttribute("href", appUrl);
        openButton.addEventListener("click", function (event) {
          event.preventDefault();
          window.location.href = appUrl;
        });
      } else {
        openButton.textContent = "Invite link missing";
        openButton.classList.add("disabled");
        openButton.setAttribute("aria-disabled", "true");
        openButton.removeAttribute("href");
      }
    }

    function formatTime(value) {
      if (!value) {
        return "";
      }

      const parsed = new Date(value);
      if (!Number.isNaN(parsed.getTime())) {
        return parsed.toLocaleString([], {
          dateStyle: "medium",
          timeStyle: "short"
        });
      }

      return String(value);
    }

    function canJoinPreview(preview) {
      if (!hangoutId || !inviteToken || hangoutId === "hangout") {
        return false;
      }

      if (!preview) {
        return false;
      }

      if (preview.active === false || preview.isActive === false) {
        return false;
      }

      if (preview.status === "inactive" || preview.status === "ended") {
        return false;
      }

      return true;
    }

    function renderPreview(preview) {
      const title = preview.title || preview.name || preview.hangoutTitle || "A hangout";
      const subtitle = preview.subtitle || "Open Impromptu to see the details and join if you’d like.";
      const timeValue = preview.time || preview.startsAt || preview.scheduledAt || preview.when || preview.displayTime;
      const destinationValue = preview.destination || preview.location || preview.place || preview.where || "";

      previewTitle.textContent = title;
      previewSubtitle.textContent = subtitle;
      document.title = title;

      if (timeValue || destinationValue) {
        previewDetails.hidden = false;
        previewTime.textContent = timeValue ? formatTime(timeValue) : "—";
        previewDestination.textContent = destinationValue || "—";
      } else {
        previewDetails.hidden = true;
      }

      if (destinationValue) {
        const mapsUrl = `https://maps.apple.com/?q=${encodeURIComponent(destinationValue)}`;
        mapsButton.hidden = false;
        mapsButton.setAttribute("href", mapsUrl);
        mapsButton.addEventListener("click", function (event) {
          event.preventDefault();
          window.location.href = mapsUrl;
        });
      } else {
        mapsButton.hidden = true;
      }

      if (canJoinPreview(preview)) {
        joinSection.hidden = false;
        setNote("Enter your display name to join this hangout from your browser.");
        setJoinMessage("");
      } else {
        joinSection.hidden = true;
        if (inviteToken) {
          setNote("Browser joining isn’t available for this invite yet.");
        } else {
          setNote("This link doesn’t include a join token, so browser joining isn’t available here.");
        }
      }
    }

    function showJoinedState() {
      joinSection.hidden = true;
      joinMessage.textContent = "";
      setNote("You’ve joined. You can open Impromptu, or keep this page open for browser status updates coming next.");
      joinMessage.className = "join-message success";
    }

    async function loadPreview() {
      if (!firebaseConfig || !hangoutId || hangoutId === "hangout") {
        if (!inviteToken) {
          setNote("This invite link is missing the information needed for browser joining.");
        }
        if (!firebaseConfig) {
          console.error("[join debug] Firebase config missing");
          setDebugStatus("firebase-config-missing", "Firebase config not found on window.");
        }
        return null;
      }

      try {
        const app = initializeApp(firebaseConfig);
        database = getDatabase(app);
        auth = getAuth(app);
        functions = getFunctions(app, functionsRegion);
        console.log("[join debug] functions region configured:", functionsRegion);

        const previewSnapshot = await get(ref(database, `hangoutPreviews/${hangoutId}`));
        if (previewSnapshot.exists()) {
          const preview = previewSnapshot.val();
          renderPreview(preview);
          return preview;
        }

        previewTitle.textContent = "The invite preview is unavailable.";
        previewSubtitle.textContent = "Open Impromptu to continue.";
        previewDetails.hidden = true;
        mapsButton.hidden = true;
        joinSection.hidden = true;
        setNote("We couldn’t load the invite preview right now.");
        return null;
      } catch (error) {
        previewTitle.textContent = "The invite preview is unavailable.";
        previewSubtitle.textContent = "Open Impromptu to continue.";
        previewDetails.hidden = true;
        mapsButton.hidden = true;
        joinSection.hidden = true;
        setNote("We couldn’t load the invite preview right now.");
        return null;
      }
    }

    joinButton.addEventListener("click", async function () {
      const displayName = displayNameInput.value.trim();
      if (displayName.length < 1 || displayName.length > 40) {
        setJoinMessage("Please enter a display name between 1 and 40 characters.", true);
        return;
      }

      if (!auth || !functions) {
        console.error("[join debug] join handler unavailable", {
          code: "auth-or-functions-not-ready",
          message: "Auth or functions not initialized",
          details: "auth=" + Boolean(auth) + ", functions=" + Boolean(functions)
        });
        setJoinMessage("Joining is unavailable right now.", true);
        setDebugStatus("auth-or-functions-not-ready", "Auth or Functions was not initialized.");
        return;
      }

      joinButton.disabled = true;
      joinButton.textContent = "Joining...";
      setJoinMessage("Joining this hangout...");

      try {
        if (!auth.currentUser) {
          await signInAnonymously(auth);
        }

        console.log("[join debug] auth.currentUser after signInAnonymously:", Boolean(auth.currentUser));

        const joinHangout = httpsCallable(functions, "joinHangout");
        const result = await joinHangout({
          hangoutId,
          inviteToken,
          displayName
        });

        if (result?.data?.ok) {
          showJoinedState();
        } else {
          throw new Error("Join failed");
        }
      } catch (error) {
        console.error("[join debug] joinHangout error", {
          code: error?.code,
          message: error?.message,
          details: error?.details
        });
        setJoinMessage("Couldn’t join this hangout. The invite may have expired or already been used.", true);
        setDebugStatus(error?.code || "join-failed", error?.message || "Join attempt failed.");
      } finally {
        joinButton.disabled = false;
        joinButton.textContent = "Join";
      }
    });

    setOpenAppLink();
    loadPreview();
  </script>
</body>
</html>
