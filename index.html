<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Open in Impromptu</title>

  <style>
    :root {
      --page-bg: #070522;
      --page-bg-2: #0c0730;

      --card-bg: rgba(10, 7, 42, 0.72);
      --card-border: rgba(151, 132, 255, 0.18);

      --text-primary: #f4f2ff;
      --text-secondary: #aaa3c7;
      --text-muted: #817a9e;

      --button-bg: #9d82f4;
      --button-text: #28195d;

      --opa-gold: #e7b74d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page-bg);
      color: var(--text-primary);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "SF Pro Text",
        system-ui,
        sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 8%, rgba(75, 63, 164, 0.22), transparent 34%),
        radial-gradient(circle at 50% 72%, rgba(82, 54, 164, 0.12), transparent 42%),
        linear-gradient(180deg, #100b3d 0%, var(--page-bg) 58%, #09051f 100%);
    }

    .page {
      position: relative;
      min-height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 38px 22px;
      overflow: hidden;
      isolation: isolate;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
      pointer-events: none;
      z-index: -2;
    }

    .page::after {
      content: "";
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 999px;
      background: rgba(114, 91, 255, 0.08);
      filter: blur(90px);
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: -1;
    }

    .shell {
      width: min(100%, 430px);
      min-height: calc(100vh - 76px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 58px;
    }

    .brand-top {
      margin-bottom: 58px;
      color: rgba(244, 242, 255, 0.68);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.42em;
      text-align: center;
    }

    .invite-card {
      width: 100%;
      max-width: 340px;
      padding: 38px 32px 34px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(12, 8, 45, 0.78), rgba(8, 5, 35, 0.84));
      border: 1px solid var(--card-border);
      box-shadow:
        0 24px 54px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    h1 {
      margin: 0;
      max-width: 275px;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: -0.055em;
      font-weight: 800;
      color: var(--text-primary);
    }

    .subtitle {
      margin: 22px 0 28px;
      max-width: 275px;
      font-size: 19px;
      line-height: 1.45;
      letter-spacing: -0.03em;
      color: var(--text-secondary);
    }

    .button {
      width: 100%;
      min-height: 64px;
      border: 0;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 13px;
      padding: 18px 20px;
      background: var(--button-bg);
      color: var(--button-text);
      text-decoration: none;
      font-size: 19px;
      line-height: 1;
      font-weight: 750;
      letter-spacing: -0.025em;
      box-shadow:
        0 8px 18px rgba(25, 12, 77, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transition:
        transform 150ms ease,
        background 150ms ease,
        box-shadow 150ms ease;
    }

    .button:active {
      transform: scale(0.985);
      background: #9277e8;
      box-shadow:
        0 4px 10px rgba(25, 12, 77, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .button svg {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .button.secondary {
      margin-top: 14px;
      background: rgba(157, 130, 244, 0.12);
      color: var(--text-primary);
      border: 1px solid rgba(151, 132, 255, 0.18);
      box-shadow: none;
    }

    .button.disabled {
      pointer-events: none;
      opacity: 0.58;
    }

    .details {
      display: grid;
      gap: 16px;
      margin: 0 0 26px;
      padding: 0;
      list-style: none;
    }

    .detail {
      display: grid;
      gap: 4px;
    }

    .detail-label {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .detail-value {
      color: var(--text-primary);
      font-size: 17px;
      line-height: 1.35;
      letter-spacing: -0.02em;
    }

    .detail-value.muted {
      color: var(--text-secondary);
    }

    [hidden] {
      display: none !important;
    }

    .note {
      margin-top: 28px;
      width: 100%;
      padding: 22px 21px;
      border-radius: 10px;
      border: 1px solid rgba(151, 132, 255, 0.12);
      background: rgba(5, 3, 28, 0.2);
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 14px;
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.45;
      letter-spacing: -0.02em;
    }

    .note svg {
      width: 20px;
      height: 20px;
      color: rgba(157, 130, 244, 0.72);
      margin-top: 1px;
    }

    .footer {
      margin-top: auto;
      padding-top: 84px;
      text-align: center;
    }

    .opa-link {
      position: relative;
      display: inline-block;
      color: var(--opa-gold);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-decoration: none;
      padding: 10px 2px;
      transition:
        opacity 150ms ease,
        transform 150ms ease;
    }

    .opa-link::after {
      content: "";
      position: absolute;
      left: 2px;
      right: calc(2px + 0.22em);
      bottom: 6px;
      height: 1px;
      background: currentColor;
      opacity: 0.24;
      transform: scaleX(0.42);
      transform-origin: center;
      transition:
        opacity 150ms ease,
        transform 150ms ease;
    }

    .opa-link:hover::after,
    .opa-link:focus-visible::after {
      opacity: 0.42;
      transform: scaleX(0.72);
    }

    .opa-link:active {
      opacity: 0.78;
      transform: scale(0.985);
    }

    .opa-link:focus-visible {
      outline: 1px solid rgba(231, 183, 77, 0.55);
      outline-offset: 7px;
      border-radius: 999px;
    }

    @media (max-width: 390px) {
      .page {
        padding: 0;
      }

      .shell {
        width: 100%;
        min-height: 100vh;
        padding: 54px 24px 52px;
      }

      .brand-top {
        margin-bottom: 56px;
      }

      .invite-card {
        max-width: 320px;
        padding: 36px 30px 32px;
      }

      h1 {
        font-size: 33px;
      }

      .subtitle {
        font-size: 18px;
      }

      .footer {
        padding-top: 74px;
      }
    }

    @media (max-width: 340px) {
      .invite-card {
        padding: 32px 26px 30px;
      }

      h1 {
        font-size: 30px;
      }

      .subtitle,
      .button {
        font-size: 17px;
      }

      .note {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="shell" aria-label="Impromptu invite landing page">
      <div class="brand-top">IMPROMPTU</div>

      <div class="invite-card">
        <h1 id="inviteTitle">Loading invite...</h1>

        <p class="subtitle" id="subtitle">
          Here are the details shared with this invite.
        </p>

        <ul class="details" id="details" hidden>
          <li class="detail" id="timeDetail" hidden>
            <span class="detail-label">Time</span>
            <span class="detail-value" id="startTime"></span>
          </li>

          <li class="detail" id="locationNameDetail" hidden>
            <span class="detail-label">Location</span>
            <span class="detail-value" id="locationName"></span>
          </li>

          <li class="detail" id="locationAddressDetail" hidden>
            <span class="detail-label">Address</span>
            <span class="detail-value muted" id="locationAddress"></span>
          </li>
        </ul>

        <a class="button secondary" id="mapsButton" href="#" target="_blank" rel="noopener" hidden>
          <span>Open in Maps</span>
        </a>

        <a class="button" id="openButton" href="#">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M14 4h6v6M20 4l-9 9"
              stroke="currentColor"
              stroke-width="2.15"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M11 5H7.2C5.43 5 4 6.43 4 8.2v8.6C4 18.57 5.43 20 7.2 20h8.6c1.77 0 3.2-1.43 3.2-3.2V13"
              stroke="currentColor"
              stroke-width="2.15"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>

          <span>Open in Impromptu</span>
        </a>

        <div class="note" id="browserNote">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 8v5"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
            <path
              d="M12 16.8h.01"
              stroke="currentColor"
              stroke-width="2.8"
              stroke-linecap="round"
            />
            <circle
              cx="12"
              cy="12"
              r="9"
              stroke="currentColor"
              stroke-width="1.8"
            />
          </svg>

          <div>
            Browser joining is coming soon.
          </div>
        </div>
      </div>

      <footer class="footer">
        <a class="opa-link" href="https://onepartanalog.com/" aria-label="Visit One Part Analog">
        One Part Analog
        </a>
      </footer>
    </section>
  </main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "impromptu-public-web-api-key",
    authDomain: "impromptu.firebaseapp.com",
    projectId: "impromptu-e1ca3",
    storageBucket: "impromptu.appspot.com",
    messagingSenderId: "000000000000",
    appId: "1:000000000000:web:impromptu"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const title = document.getElementById("inviteTitle");
  const subtitle = document.getElementById("subtitle");
  const details = document.getElementById("details");
  const timeDetail = document.getElementById("timeDetail");
  const startTime = document.getElementById("startTime");
  const locationNameDetail = document.getElementById("locationNameDetail");
  const locationName = document.getElementById("locationName");
  const locationAddressDetail = document.getElementById("locationAddressDetail");
  const locationAddress = document.getElementById("locationAddress");
  const mapsButton = document.getElementById("mapsButton");
  const openButton = document.getElementById("openButton");

  function getInviteTitle(preview) {
    const organizerDisplayName = preview.organizerDisplayName;
    const activityDisplayName = preview.activityDisplayName;
    const activityInvitePhrase = preview.activityInvitePhrase;

    if (activityInvitePhrase) {
      if (organizerDisplayName) {
        return `${organizerDisplayName} is inviting you ${activityInvitePhrase}`;
      }

      return `You\u2019re invited ${activityInvitePhrase}`;
    }

    return activityDisplayName || preview.activity || "You\u2019ve been invited to a hangout.";
  }

  function getHangoutId() {
    const pathParts = window.location.pathname.split("/").filter(Boolean);
    const hangoutIndex = pathParts.indexOf("hangout");

    if (hangoutIndex >= 0 && pathParts[hangoutIndex + 1]) {
      return decodeURIComponent(pathParts[hangoutIndex + 1]);
    }

    const searchParams = new URLSearchParams(window.location.search);
    return searchParams.get("id") || "";
  }

  function getInviteToken() {
    const searchParams = new URLSearchParams(window.location.search);
    return searchParams.get("invite") || "";
  }

  function getDateValue(value) {
    if (!value) {
      return null;
    }

    if (typeof value.toDate === "function") {
      return value.toDate();
    }

    if (typeof value.seconds === "number") {
      return new Date(value.seconds * 1000);
    }

    const date = new Date(value);
    return Number.isNaN(date.getTime()) ? null : date;
  }

  function formatStartTime(value) {
    const date = getDateValue(value);

    if (!date) {
      return "";
    }

    return new Intl.DateTimeFormat(undefined, {
      weekday: "short",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit"
    }).format(date);
  }

  function isPast(value) {
    const date = getDateValue(value);
    return Boolean(date && date.getTime() < Date.now());
  }

  function setOpenButton(hangoutId) {
    const appUrl = `impromptu://hangout/${encodeURIComponent(hangoutId)}`;

    openButton.classList.remove("disabled");
    openButton.setAttribute("href", appUrl);
    openButton.setAttribute("aria-disabled", "false");

    openButton.addEventListener("click", function (event) {
      event.preventDefault();
      window.location.href = appUrl;
    });
  }

  function disableOpenButton(label) {
    openButton.textContent = label;
    openButton.classList.add("disabled");
    openButton.setAttribute("aria-disabled", "true");
    openButton.removeAttribute("href");
  }

  function renderState(state) {
    details.hidden = true;
    mapsButton.hidden = true;

    if (state === "loading") {
      title.textContent = "Loading invite...";
      subtitle.textContent = "Here are the details shared with this invite.";
      return;
    }

    if (state === "expired") {
      title.textContent = "This invite has expired.";
      subtitle.textContent = "Ask the organizer to send you a new invite.";
      return;
    }

    if (state === "ended") {
      title.textContent = "This hangout has ended.";
      subtitle.textContent = "This invite is no longer active.";
      return;
    }

    title.textContent = "Invite unavailable.";
    subtitle.textContent = "This invite could not be found or is no longer available.";
  }

  function renderMapsLink(preview) {
    const query = [preview.locationName, preview.locationAddress].filter(Boolean).join(", ");

    if (!query) {
      mapsButton.hidden = true;
      mapsButton.removeAttribute("href");
      return;
    }

    mapsButton.hidden = false;
    mapsButton.setAttribute(
      "href",
      `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`
    );
  }

  function renderPreview(preview) {
    title.textContent = getInviteTitle(preview);
    subtitle.textContent = "Here are the details shared with this invite.";

    const formattedStartTime = formatStartTime(preview.startTime);
    timeDetail.hidden = !formattedStartTime;
    startTime.textContent = formattedStartTime;

    locationNameDetail.hidden = !preview.locationName;
    locationName.textContent = preview.locationName || "";

    locationAddressDetail.hidden = !preview.locationAddress;
    locationAddress.textContent = preview.locationAddress || "";

    details.hidden = !formattedStartTime && !preview.locationName && !preview.locationAddress;
    renderMapsLink(preview);
  }

  async function loadPreview() {
    renderState("loading");

    const hangoutId = getHangoutId();
    const inviteToken = getInviteToken();
    void inviteToken;

    if (!hangoutId) {
      renderState("unavailable");
      disableOpenButton("Invite link missing");
      return;
    }

    setOpenButton(hangoutId);

    try {
      const previewRef = doc(db, "hangoutPreviews", hangoutId);
      const previewSnapshot = await getDoc(previewRef);

      if (!previewSnapshot.exists()) {
        renderState("unavailable");
        return;
      }

      const preview = previewSnapshot.data();

      if (preview.status === "ended" || preview.endedAt || isPast(preview.endTime)) {
        renderState("ended");
        return;
      }

      if (preview.status === "expired" || preview.expiredAt || isPast(preview.expiresAt)) {
        renderState("expired");
        return;
      }

      renderPreview(preview);
    } catch (error) {
      renderState("unavailable");
    }
  }

  loadPreview();
</script>
</body>
</html>
