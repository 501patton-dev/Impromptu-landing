<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Open in Impromptu</title>

  <style>
    :root {
      --page-bg: #070522;
      --page-bg-2: #0c0730;

      --card-bg: rgba(10, 7, 42, 0.72);
      --card-border: rgba(151, 132, 255, 0.18);

      --text-primary: #f4f2ff;
      --text-secondary: #aaa3c7;
      --text-muted: #817a9e;

      --button-bg: #9d82f4;
      --button-text: #28195d;
      --button-secondary-bg: rgba(157, 130, 244, 0.14);
      --button-secondary-text: #d8cffc;

      --opa-gold: #e7b74d;
    }

    [hidden] {
      display: none !important;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page-bg);
      color: var(--text-primary);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "SF Pro Text",
        system-ui,
        sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 8%, rgba(75, 63, 164, 0.22), transparent 34%),
        radial-gradient(circle at 50% 72%, rgba(82, 54, 164, 0.12), transparent 42%),
        linear-gradient(180deg, #100b3d 0%, var(--page-bg) 58%, #09051f 100%);
    }

    .page {
      position: relative;
      min-height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 38px 22px;
      overflow: hidden;
      isolation: isolate;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
      pointer-events: none;
      z-index: -2;
    }

    .page::after {
      content: "";
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 999px;
      background: rgba(114, 91, 255, 0.08);
      filter: blur(90px);
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: -1;
    }

    .shell {
      width: min(100%, 430px);
      min-height: calc(100vh - 76px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 58px;
    }

    .brand-top {
      margin-bottom: 58px;
      color: rgba(244, 242, 255, 0.68);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.42em;
      text-align: center;
    }

    .invite-card {
      width: 100%;
      max-width: 340px;
      padding: 38px 32px 34px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(12, 8, 45, 0.78), rgba(8, 5, 35, 0.84));
      border: 1px solid var(--card-border);
      box-shadow:
        0 24px 54px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    h1 {
      margin: 0;
      max-width: 275px;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: -0.055em;
      font-weight: 800;
      color: var(--text-primary);
    }

    .subtitle {
      margin: 22px 0 28px;
      max-width: 275px;
      font-size: 19px;
      line-height: 1.45;
      letter-spacing: -0.03em;
      color: var(--text-secondary);
    }

    .details {
      display: grid;
      gap: 14px;
      margin: 0 0 24px;
      padding: 16px 0 0;
      border-top: 1px solid rgba(151, 132, 255, 0.14);
    }

    .preview-detail {
      display: grid;
      gap: 4px;
    }

    .detail-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(244, 242, 255, 0.46);
    }

    .detail-value {
      font-size: 16px;
      line-height: 1.45;
      color: var(--text-primary);
    }

    .action-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .button {
      width: 100%;
      min-height: 64px;
      border: 0;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 13px;
      padding: 18px 20px;
      background: var(--button-bg);
      color: var(--button-text);
      text-decoration: none;
      font-size: 19px;
      line-height: 1;
      font-weight: 750;
      letter-spacing: -0.025em;
      box-shadow:
        0 8px 18px rgba(25, 12, 77, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transition:
        transform 150ms ease,
        background 150ms ease,
        box-shadow 150ms ease;
      cursor: pointer;
    }

    .button.secondary {
      background: var(--button-secondary-bg);
      color: var(--button-secondary-text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.055);
    }

    .button.primary {
      min-height: 68px;
      font-size: 20px;
      box-shadow:
        0 12px 22px rgba(25, 12, 77, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .button.tertiary {
      min-height: 52px;
      padding: 14px 16px;
      font-size: 16px;
      background: rgba(157, 130, 244, 0.14);
      color: var(--button-secondary-text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .inline-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: rgba(216, 207, 252, 0.9);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-decoration: none;
      opacity: 0.96;
    }

    .inline-link svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .inline-link:hover,
    .inline-link:focus-visible {
      color: #e9ddff;
      text-decoration: underline;
      opacity: 1;
    }

    .beta-request {
      margin: 18px 0 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      color: rgba(244, 242, 255, 0.54);
      font-size: 13px;
      line-height: 1.5;
    }

    .beta-link {
      color: rgba(216, 207, 252, 0.9);
      font-weight: 600;
      text-decoration: none;
    }

    .beta-link:hover,
    .beta-link:focus-visible {
      color: #e9ddff;
      text-decoration: underline;
    }

    .button:active {
      transform: scale(0.985);
      background: #9277e8;
      box-shadow:
        0 4px 10px rgba(25, 12, 77, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .button.secondary:active {
      background: rgba(157, 130, 244, 0.18);
    }

    .button[disabled] {
      opacity: 0.72;
      cursor: wait;
    }

    .button svg {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .join-section {
      margin-top: 18px;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .join-label {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-secondary);
    }

    .join-input {
      width: 100%;
      min-height: 52px;
      border: 1px solid rgba(185, 170, 255, 0.72);
      border-radius: 12px;
      padding: 14px 16px;
      background: rgba(8, 5, 35, 0.78);
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    .join-input:focus {
      border-color: rgba(201, 186, 255, 0.95);
      box-shadow: 0 0 0 3px rgba(157, 130, 244, 0.18);
    }

    .join-message {
      margin: 0;
      font-size: 15px;
      line-height: 1.45;
      color: var(--text-muted);
    }

    .join-message.error {
      color: #ffb5b5;
    }

    .join-message.success {
      color: #d8f4df;
    }

    .joined-state {
      margin-top: 14px;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .status-section {
      margin-top: 18px;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .status-section-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-secondary);
    }

    .status-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }

    .status-button {
      min-height: 50px;
      border: 1px solid rgba(157, 130, 244, 0.34);
      border-radius: 12px;
      padding: 12px 10px;
      background: rgba(8, 5, 35, 0.78);
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
      transition: border-color 150ms ease, background 150ms ease, transform 150ms ease;
    }

    .status-button:active {
      transform: scale(0.985);
    }

    .status-button.active {
      border-color: rgba(157, 130, 244, 0.82);
      background: rgba(157, 130, 244, 0.18);
      box-shadow: 0 0 0 1px rgba(157, 130, 244, 0.14);
    }

    .status-button[disabled] {
      opacity: 0.72;
      cursor: wait;
    }

    .status-message {
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
      color: var(--text-muted);
    }

    .status-message.error {
      color: #ffb5b5;
    }

    .people-section {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid rgba(151, 132, 255, 0.14);
      display: grid;
      gap: 8px;
    }

    .people-section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(244, 242, 255, 0.58);
    }

    .people-list {
      display: grid;
      gap: 6px;
    }

    .people-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(151, 132, 255, 0.08);
    }

    .people-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .people-name {
      font-size: 16px;
      line-height: 1.35;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .people-status {
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(157, 130, 244, 0.12);
      color: rgba(244, 242, 255, 0.74);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .debug-status {
      margin: 0;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(244, 242, 255, 0.54);
      word-break: break-word;
    }

    .note {
      margin-top: 28px;
      width: 100%;
      padding: 22px 21px;
      border-radius: 10px;
      border: 1px solid rgba(151, 132, 255, 0.12);
      background: rgba(5, 3, 28, 0.2);
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 14px;
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.45;
      letter-spacing: -0.02em;
    }

    .note svg {
      width: 20px;
      height: 20px;
      color: rgba(157, 130, 244, 0.72);
      margin-top: 1px;
    }

    .footer {
      margin-top: auto;
      padding-top: 84px;
      text-align: center;
    }

    .opa-link {
      position: relative;
      display: inline-block;
      color: var(--opa-gold);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-decoration: none;
      padding: 10px 2px;
      transition:
        opacity 150ms ease,
        transform 150ms ease;
    }

    .opa-link::after {
      content: "";
      position: absolute;
      left: 2px;
      right: calc(2px + 0.22em);
      bottom: 6px;
      height: 1px;
      background: currentColor;
      opacity: 0.24;
      transform: scaleX(0.42);
      transform-origin: center;
      transition:
        opacity 150ms ease,
        transform 150ms ease;
    }

    .opa-link:hover::after,
    .opa-link:focus-visible::after {
      opacity: 0.42;
      transform: scaleX(0.72);
    }

    .opa-link:active {
      opacity: 0.78;
      transform: scale(0.985);
    }

    .opa-link:focus-visible {
      outline: 1px solid rgba(231, 183, 77, 0.55);
      outline-offset: 7px;
      border-radius: 999px;
    }

    @media (max-width: 390px) {
      .page {
        padding: 0;
      }

      .shell {
        width: 100%;
        min-height: 100vh;
        padding: 54px 24px 52px;
      }

      .brand-top {
        margin-bottom: 56px;
      }

      .invite-card {
        max-width: 320px;
        padding: 36px 30px 32px;
      }

      h1 {
        font-size: 33px;
      }

      .subtitle {
        font-size: 18px;
      }

      .footer {
        padding-top: 74px;
      }
    }

    @media (max-width: 340px) {
      .invite-card {
        padding: 32px 26px 30px;
      }

      h1 {
        font-size: 30px;
      }

      .subtitle,
      .button {
        font-size: 17px;
      }

      .note {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="shell" aria-label="Impromptu invite landing page">
      <div class="brand-top">IMPROMPTU</div>

      <div class="invite-card">
        <h1 id="previewTitle">You&rsquo;ve been invited to a hangout.</h1>

        <p class="subtitle" id="previewSubtitle"></p>

        <div class="details" id="previewDetails" hidden>
          <div class="preview-detail">
            <span class="detail-label">When</span>
            <div class="detail-value" id="previewTime">—</div>
          </div>
          <div class="preview-detail">
            <span class="detail-label">Where</span>
            <div class="detail-value" id="previewDestination">—</div>
          </div>
        </div>

        <div class="join-section" id="joinSection" hidden>
          <label class="join-label" for="displayNameInput">Display name</label>
          <input
            class="join-input"
            id="displayNameInput"
            name="displayName"
            type="text"
            maxlength="40"
            autocomplete="nickname"
            placeholder="Your name"
          />
          <button class="button primary" id="joinButton" type="button">Join</button>
          <p class="join-message" id="joinMessage" role="status"></p>
          <p class="debug-status" id="debugStatus" hidden></p>
        </div>

        <div class="joined-state" id="joinedState" hidden>
          <p class="join-message success">You’ve joined.</p>
        </div>

        <div class="status-section" id="statusSection" hidden>
          <div class="status-section-title">Your status</div>
          <div class="status-grid">
            <button class="status-button" type="button" data-status="headedOut">Heading out</button>
            <button class="status-button" type="button" data-status="close">I’m close</button>
            <button class="status-button" type="button" data-status="arrived">I arrived</button>
            <button class="status-button" type="button" data-status="private">Private</button>
          </div>
          <p class="status-message" id="statusMessage" role="status"></p>
        </div>

        <div class="action-stack" id="secondaryActions">
          <a class="button secondary" id="mapsButton" href="#" hidden>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M9 4.5 3 6.5v13l6-2 6 2 6-2v-13l-6 2-6-2Z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <path d="M9 4.5v13" stroke="currentColor" stroke-width="1.8" />
              <path d="M15 6.5v13" stroke="currentColor" stroke-width="1.8" />
            </svg>
            <span>Open in Maps</span>
          </a>
        </div>

        <a class="inline-link" id="openButton" href="#" hidden>
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M14 4h6v6M20 4l-9 9"
              stroke="currentColor"
              stroke-width="2.15"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M11 5H7.2C5.43 5 4 6.43 4 8.2v8.6C4 18.57 5.43 20 7.2 20h8.6c1.77 0 3.2-1.43 3.2-3.2V13"
              stroke="currentColor"
              stroke-width="2.15"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>

          <span>Open in Impromptu</span>
        </a>

        <section class="people-section" id="peopleSection" hidden>
          <div class="people-section-title">People here</div>
          <div class="people-list" id="peopleList"></div>
        </section>

        <div class="note" id="inviteNote" role="status">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 8v5"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
            <path
              d="M12 16.8h.01"
              stroke="currentColor"
              stroke-width="2.8"
              stroke-linecap="round"
            />
            <circle
              cx="12"
              cy="12"
              r="9"
              stroke="currentColor"
              stroke-width="1.8"
            />
          </svg>

          <div id="noteContent">
            If the app doesn&rsquo;t open, make sure Impromptu is installed on your device.
          </div>
        </div>

        <p class="beta-request">
          <span>Want to organize your own?</span>
          <a
            class="beta-link"
            href="mailto:YOUR_EMAIL@example.com?subject=Impromptu%20beta%20access&body=Hi%20Levi%2C%20I%27d%20like%20to%20try%20organizing%20with%20Impromptu."
            title="Replace the placeholder email before sharing"
          >
            Request beta access
          </a>
        </p>
      </div>

      <footer class="footer">
        <a class="opa-link" href="https://onepartanalog.com/" aria-label="Visit One Part Analog">
          One Part Analog
        </a>
      </footer>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-functions.js";

    const openButton = document.getElementById("openButton");
    const mapsButton = document.getElementById("mapsButton");
    const previewTitle = document.getElementById("previewTitle");
    const previewSubtitle = document.getElementById("previewSubtitle");
    const previewDetails = document.getElementById("previewDetails");
    const previewTime = document.getElementById("previewTime");
    const previewDestination = document.getElementById("previewDestination");
    const joinSection = document.getElementById("joinSection");
    const joinedState = document.getElementById("joinedState");
    const displayNameInput = document.getElementById("displayNameInput");
    const joinButton = document.getElementById("joinButton");
    const joinMessage = document.getElementById("joinMessage");
    const statusSection = document.getElementById("statusSection");
    const statusButtons = Array.from(document.querySelectorAll(".status-button"));
    const statusMessage = document.getElementById("statusMessage");
    const debugStatus = document.getElementById("debugStatus");
    const noteContent = document.getElementById("noteContent");
    const peopleSection = document.getElementById("peopleSection");
    const peopleList = document.getElementById("peopleList");

    const pathParts = window.location.pathname.split("/").filter(Boolean);
    const pathHangoutId = pathParts[pathParts.length - 1];

    const searchParams = new URLSearchParams(window.location.search);
    const queryHangoutId = searchParams.get("id");
    const inviteToken = searchParams.get("invite");
    const hangoutId = queryHangoutId || pathHangoutId;
    const firebaseConfig = {
      apiKey: "AIzaSyAcEDXDzEuakzTl82aPoP2fWIPNA1DwhUc",
      authDomain: "impromptu-e1ca3.firebaseapp.com",
      projectId: "impromptu-e1ca3",
      storageBucket: "impromptu-e1ca3.firebasestorage.app",
      messagingSenderId: "74640326895",
      appId: "1:74640326895:web:a878ef0d9185d11c365b1a"
    };
    const functionsRegion = "us-central1";
    const debugModeEnabled = new URLSearchParams(window.location.search).get("debug") === "1";

    let auth = null;
    let functions = null;
    let db = null;
    let currentPreviewData = null;
    let currentOrganizerName = "";
    let currentOrganizerId = "";
    let peopleUnsubscribe = null;
    let hangoutUnsubscribe = null;
    let currentPeopleEntries = [];
    let currentBrowserParticipantId = "";
    let currentBrowserParticipantName = "";
    let currentBrowserParticipantStatus = "private";
    let joinedStateStorageKey = "impromptu-browser-joined";

    function setNote(message) {
      noteContent.textContent = message;
    }

    function setJoinMessage(message, isError = false) {
      joinMessage.textContent = message;
      joinMessage.classList.toggle("error", isError);
      joinMessage.classList.toggle("success", !isError && message.length > 0);
    }

    function setStatusMessage(message, isError = false) {
      statusMessage.textContent = message;
      statusMessage.classList.toggle("error", isError);
    }

    function setSelectedStatus(status) {
      statusButtons.forEach((button) => {
        const isActive = button.dataset.status === status;
        button.classList.toggle("active", isActive);
      });
    }

    function getStatusLabel(status) {
      switch (status) {
        case "headedOut":
          return "Heading out";
        case "close":
          return "I’m close";
        case "arrived":
          return "I arrived";
        case "private":
        default:
          return "Private";
      }
    }

    function getPersonName(person) {
      const rawName = person?.displayName || person?.name || person?.participantName || person?.fullName || "";
      return rawName.trim() || "Participant";
    }

    function getPersonStatus(person) {
      const rawStatus = person?.status || person?.currentStatus || "private";
      return getStatusLabel(rawStatus);
    }

    function getJoinedStateStorageKey() {
      return `${joinedStateStorageKey}:${hangoutId || ""}`;
    }

    function saveJoinedState() {
      if (!hangoutId || hangoutId === "hangout") {
        return;
      }

      const state = {
        hangoutId,
        participantId: currentBrowserParticipantId,
        displayName: currentBrowserParticipantName || displayNameInput.value.trim() || "Participant",
        joinedAt: Date.now()
      };

      localStorage.setItem(getJoinedStateStorageKey(), JSON.stringify(state));
    }

    async function restoreJoinedState() {
      if (!hangoutId || hangoutId === "hangout") {
        return false;
      }

      const storedStateText = localStorage.getItem(getJoinedStateStorageKey());
      if (!storedStateText) {
        return false;
      }

      try {
        const storedState = JSON.parse(storedStateText);
        if (!storedState?.participantId) {
          clearJoinedState();
          return false;
        }

        if (!db) {
          return false;
        }

        const participantDoc = await getDoc(doc(db, "hangouts", hangoutId, "participants", storedState.participantId));
        if (!participantDoc.exists()) {
          clearJoinedState();
          return false;
        }

        const participantData = participantDoc.data();
        currentBrowserParticipantId = storedState.participantId;
        currentBrowserParticipantName = storedState.displayName || getPersonName(participantData) || "Participant";
        currentBrowserParticipantStatus = participantData?.status || "private";
        displayNameInput.value = currentBrowserParticipantName;
        showJoinedState({ restoreFromStorage: true, participantData });
        return true;
      } catch (error) {
        console.error("[join debug] restore joined state error", {
          code: error?.code,
          message: error?.message,
          details: error?.details
        });
        clearJoinedState();
        return false;
      }
    }

    function clearPeopleSection() {
      peopleList.innerHTML = "";
      peopleSection.hidden = true;
    }

    function clearJoinedState() {
      localStorage.removeItem(getJoinedStateStorageKey());
    }

    function stopPeopleListeners() {
      if (peopleUnsubscribe) {
        peopleUnsubscribe();
        peopleUnsubscribe = null;
      }

      if (hangoutUnsubscribe) {
        hangoutUnsubscribe();
        hangoutUnsubscribe = null;
      }

      currentPeopleEntries = [];
      clearPeopleSection();
    }

    function renderPeopleSection() {
      const entries = [];
      const seen = new Set();
      const hostParticipantEntry = currentPeopleEntries.find((entry) => {
        const entryId = entry?.id || entry?.participantId || entry?.uid || entry?.userId || "";
        const normalizedName = (entry?.displayName || "").trim().toLowerCase();
        const organizerName = currentOrganizerName.trim().toLowerCase();
        const matchesId = Boolean(currentOrganizerId && entryId && String(entryId) === String(currentOrganizerId));
        const matchesName = Boolean(organizerName && normalizedName && normalizedName === organizerName);
        const matchesRole = Boolean(entry?.role === "host" || entry?.role === "organizer" || entry?.isOrganizer || entry?.isHost);
        return matchesId || matchesName || matchesRole;
      });

      if (hostParticipantEntry) {
        entries.push({
          id: hostParticipantEntry.id || currentOrganizerId || `organizer:${currentOrganizerName}`,
          displayName: getPersonName(hostParticipantEntry) || currentOrganizerName || "Host",
          status: getPersonStatus(hostParticipantEntry),
          isOrganizer: true,
          roleLabel: "Host"
        });
        seen.add(hostParticipantEntry.id || currentOrganizerId || `organizer:${currentOrganizerName}`);
      } else if (currentOrganizerName) {
        entries.push({
          id: currentOrganizerId || `organizer:${currentOrganizerName}`,
          displayName: currentOrganizerName,
          status: "Host",
          isOrganizer: true,
          roleLabel: "Host"
        });
        seen.add(currentOrganizerId || `organizer:${currentOrganizerName}`);
      }

      currentPeopleEntries.forEach((entry) => {
        const entryId = entry?.id || entry?.participantId || entry?.uid || entry?.userId || entry?.displayName || "";
        const normalizedName = (entry?.displayName || "").trim().toLowerCase();
        const organizerName = currentOrganizerName.trim().toLowerCase();
        const isOrganizerEntry = Boolean(
          (currentOrganizerId && entryId && String(entryId) === String(currentOrganizerId))
          || (organizerName && normalizedName && normalizedName === organizerName)
          || (entry?.role === "host" || entry?.role === "organizer" || entry?.isOrganizer || entry?.isHost)
        );

        if (isOrganizerEntry || !entryId) {
          return;
        }

        if (entryId && seen.has(entryId)) {
          return;
        }

        if (entryId) {
          seen.add(entryId);
        }

        entries.push({
          id: entryId || `participant:${entries.length}`,
          displayName: getPersonName(entry),
          status: getPersonStatus(entry),
          isOrganizer: false,
          roleLabel: ""
        });
      });

      if (currentBrowserParticipantId || currentBrowserParticipantName) {
        const browserId = currentBrowserParticipantId || `browser:${currentBrowserParticipantName}`;
        if (!seen.has(browserId)) {
          entries.push({
            id: browserId,
            displayName: currentBrowserParticipantName || "Participant",
            status: getStatusLabel(currentBrowserParticipantStatus),
            isOrganizer: false,
            roleLabel: ""
          });
        }
      }

      entries.sort((left, right) => {
        if (left.isOrganizer !== right.isOrganizer) {
          return left.isOrganizer ? -1 : 1;
        }

        return left.displayName.localeCompare(right.displayName);
      });

      if (!entries.length) {
        clearPeopleSection();
        return;
      }

      peopleList.innerHTML = entries.map((entry) => {
        const label = entry.isOrganizer ? "Host" : entry.roleLabel;
        const statusText = entry.isOrganizer && entry.status && entry.status !== "Host" ? entry.status : entry.status;
        const metaText = label && statusText && statusText !== "Host" ? `${label} · ${statusText}` : (label || statusText || "Private");
        return `
          <div class="people-row">
            <div class="people-name">${entry.displayName}</div>
            <div class="people-status">${metaText}</div>
          </div>
        `;
      }).join("");
      peopleSection.hidden = false;
    }

    function startPeopleListeners() {
      if (!db || !hangoutId || hangoutId === "hangout") {
        return;
      }

      stopPeopleListeners();

      peopleUnsubscribe = onSnapshot(collection(db, "hangouts", hangoutId, "participants"), (snapshot) => {
        currentPeopleEntries = snapshot.docs.map((docSnapshot) => ({
          id: docSnapshot.id,
          ...docSnapshot.data()
        }));
        renderPeopleSection();
      });

      hangoutUnsubscribe = onSnapshot(doc(db, "hangouts", hangoutId), (snapshot) => {
        const hangoutData = snapshot.exists() ? snapshot.data() : null;
        if (hangoutData?.organizerDisplayName) {
          currentOrganizerName = hangoutData.organizerDisplayName;
        } else if (currentPreviewData?.organizerDisplayName) {
          currentOrganizerName = currentPreviewData.organizerDisplayName;
        }
        if (hangoutData?.organizerId) {
          currentOrganizerId = hangoutData.organizerId;
        }

        const hangoutStatus = hangoutData?.status || currentPreviewData?.status || "active";
        if (["ended", "expired", "inactive", "unavailable", "not-active", "not_active", "closed", "disabled", "archived"].includes(String(hangoutStatus).toLowerCase())) {
          renderPreview({ ...(currentPreviewData || {}), status: hangoutStatus });
          return;
        }

        renderPeopleSection();
      });
    }

    function setJoinControlsVisible(isVisible) {
      joinSection.hidden = !isVisible;
      displayNameInput.disabled = !isVisible;
      joinButton.disabled = !isVisible;
    }

    function setDebugStatus(code, message) {
      if (!debugModeEnabled) {
        debugStatus.hidden = true;
      
        debugStatus.textContent = "";
        return;
      }

      debugStatus.hidden = false;
      debugStatus.textContent = `Debug: ${code}${message ? ` — ${message}` : ""}`;
    }

    function setOpenAppLink() {
      if (hangoutId && hangoutId !== "hangout") {
        const appUrl = `impromptu://hangout/${encodeURIComponent(hangoutId)}`;

        openButton.hidden = false;
        openButton.setAttribute("href", appUrl);
        openButton.onclick = function (event) {
          event.preventDefault();
          window.location.href = appUrl;
        };
        openButton.removeAttribute("aria-disabled");
        openButton.classList.remove("disabled");
      } else {
        openButton.hidden = true;
      }
    }

    function getDateValue(value) {
      if (!value) {
        return null;
      }

      if (typeof value.toDate === "function") {
        return value.toDate();
      }

      if (typeof value.seconds === "number") {
        return new Date(value.seconds * 1000);
      }

      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function formatDate(value) {
      const date = getDateValue(value);
      if (!date) {
        return "";
      }

      return new Intl.DateTimeFormat(undefined, {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(date);
    }

    function getInviteTitle(preview) {
      const organizerDisplayName = preview.organizerDisplayName || "";
      const activityInvitePhrase = preview.activityInvitePhrase || "";

      if (activityInvitePhrase) {
        if (organizerDisplayName) {
          return `${organizerDisplayName} is inviting you ${activityInvitePhrase}`;
        }

        return `You’re invited ${activityInvitePhrase}`;
      }

      return preview.activityDisplayName || preview.activity || "You’ve been invited to a hangout.";
    }

    function isPreviewEnded(preview) {
      const endTimeValue = preview.endTime || preview.endsAt || preview.endedAt || preview.endAt;
      const endTime = getDateValue(endTimeValue);
      return Boolean(preview.status === "ended" || (endTime && endTime.getTime() < Date.now()));
    }

    function isPreviewExpired(preview) {
      const expiresValue = preview.expiresAt || preview.expiration || preview.expires || preview.expiresOn;
      const expiresAt = getDateValue(expiresValue);
      return Boolean(preview.status === "expired" || (expiresAt && expiresAt.getTime() < Date.now()));
    }

    function isPreviewUnavailableState(preview) {
      if (!preview) {
        return true;
      }

      return Boolean(
        isPreviewEnded(preview)
        || isPreviewExpired(preview)
        || ["ended", "expired", "inactive", "unavailable", "not-active", "not_active", "closed", "disabled", "archived"].includes(preview.status)
      );
    }

    function isInactiveHangoutError(error) {
      const errorText = [error?.code, error?.message, error?.details]
        .filter(Boolean)
        .map((value) => String(value))
        .join(" ")
        .toLowerCase();

      return Boolean(
        errorText.includes("inactive")
        || errorText.includes("ended")
        || errorText.includes("expired")
        || errorText.includes("unavailable")
        || errorText.includes("not active")
        || errorText.includes("permission denied")
        || errorText.includes("failed precondition")
        || errorText.includes("not found")
        || errorText.includes("failed-precondition")
        || errorText.includes("permission-denied")
        || errorText.includes("not-found")
      );
    }

    function setPreviewUnavailable(message) {
      previewTitle.textContent = "The invite preview is unavailable.";
      previewSubtitle.textContent = "Open Impromptu to continue.";
      previewDetails.hidden = true;
      mapsButton.hidden = true;
      openButton.hidden = true;
      joinSection.hidden = true;
      joinedState.hidden = true;
      statusSection.hidden = true;
      clearPeopleSection();
      stopPeopleListeners();
      clearJoinedState();
      setNote(message);
    }

    function renderPreview(preview) {
      const title = getInviteTitle(preview);
      const locationName = preview.locationName || preview.destination || preview.location || "";
      const locationAddress = preview.locationAddress || preview.address || "";
      const startTimeValue = preview.startTime || preview.startsAt || preview.start || preview.when || preview.scheduledAt;
      const formattedStartTime = formatDate(startTimeValue);
      const coordinates = preview.latitude != null && preview.longitude != null
        ? `${preview.latitude}, ${preview.longitude}`
        : "";
      const statusText = preview.status || "active";
      const expiresText = formatDate(preview.expiresAt || preview.expiration || preview.expires || preview.expiresOn);

      previewTitle.textContent = title;
      previewSubtitle.textContent = "";
      document.title = title;
      currentPreviewData = preview;

      previewDetails.hidden = !debugModeEnabled || !(formattedStartTime || locationName || locationAddress || statusText || expiresText || coordinates);
      previewTime.textContent = formattedStartTime || "—";
      previewDestination.textContent = [locationName, locationAddress].filter(Boolean).join(" • ") || "—";
      joinedState.hidden = true;
      statusSection.hidden = true;
      clearPeopleSection();

      if (locationName || locationAddress) {
        const mapsQuery = [locationName, locationAddress].filter(Boolean).join(", ");
        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(mapsQuery)}`;
        mapsButton.hidden = false;
        mapsButton.setAttribute("href", mapsUrl);
        mapsButton.addEventListener("click", function (event) {
          event.preventDefault();
          window.location.href = mapsUrl;
        });
      } else {
        mapsButton.hidden = true;
      }

      if (isPreviewEnded(preview)) {
        previewTitle.textContent = "This hangout has ended.";
        previewSubtitle.textContent = "This invite is no longer active.";
        previewDetails.hidden = true;
        mapsButton.hidden = true;
        openButton.hidden = true;
        joinSection.hidden = true;
        joinedState.hidden = true;
        statusSection.hidden = true;
        clearPeopleSection();
        stopPeopleListeners();
        clearJoinedState();
        setNote("This hangout has ended.");
        return;
      }

      if (isPreviewExpired(preview)) {
        previewTitle.textContent = "This invite has expired.";
        previewSubtitle.textContent = "Ask the organizer to send you a new invite.";
        previewDetails.hidden = true;
        mapsButton.hidden = true;
        openButton.hidden = true;
        joinSection.hidden = true;
        joinedState.hidden = true;
        statusSection.hidden = true;
        clearPeopleSection();
        stopPeopleListeners();
        clearJoinedState();
        setNote("This invite has expired.");
        return;
      }

      const canJoin = preview.status === "active" && !isPreviewExpired(preview) && !isPreviewEnded(preview) && Boolean(inviteToken);
      const detailParts = [];
      if (debugModeEnabled) {
        if (statusText) {
          detailParts.push(`Status: ${statusText}`);
        }
        if (expiresText) {
          detailParts.push(`Expires: ${expiresText}`);
        }
        if (coordinates) {
          detailParts.push(`Coordinates: ${coordinates}`);
        }
      }

      if (canJoin) {
        setJoinControlsVisible(true);
        joinedState.hidden = true;
        statusSection.hidden = true;
        clearPeopleSection();
        setNote(detailParts.length ? detailParts.join(" • ") : "Enter your display name to join this hangout from your browser.");
        setJoinMessage("");
      } else {
        setJoinControlsVisible(false);
        joinedState.hidden = true;
        statusSection.hidden = true;
        clearPeopleSection();
        if (!inviteToken) {
          setNote("This link doesn’t include a join token, so browser joining isn’t available here.");
        } else {
          setNote(detailParts.length ? detailParts.join(" • ") : "Browser joining isn’t available for this invite yet.");
        }
      }
    }

    function showJoinedState(options = {}) {
      const { restoreFromStorage = false, participantData = null } = options;
      setJoinControlsVisible(false);
      joinedState.hidden = false;
      statusSection.hidden = false;
      joinMessage.textContent = "";
      if (!restoreFromStorage) {
        currentBrowserParticipantName = displayNameInput.value.trim() || "Participant";
        currentBrowserParticipantStatus = "private";
        currentBrowserParticipantId = auth?.currentUser?.uid || "";
        saveJoinedState();
      } else if (participantData) {
        currentBrowserParticipantStatus = participantData?.status || currentBrowserParticipantStatus;
        setSelectedStatus(currentBrowserParticipantStatus);
      }
      setSelectedStatus(currentBrowserParticipantStatus || "private");
      setStatusMessage("");
      setNote("You’ve joined. Update your status below, or open Impromptu.");
      joinMessage.className = "join-message success";
      renderPeopleSection();
      startPeopleListeners();
    }

    async function loadPreview(options = {}) {
      const { preserveCurrentState = false } = options;

      if (!hangoutId || hangoutId === "hangout") {
        setPreviewUnavailable("This invite link is missing the information needed for browser joining.");
        return null;
      }

      try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
        functions = getFunctions(app, functionsRegion);
        console.log("[join debug] functions region configured:", functionsRegion);

        const previewSnapshot = await getDoc(doc(db, "hangoutPreviews", hangoutId));
        if (previewSnapshot.exists()) {
          const preview = previewSnapshot.data();
          if (preserveCurrentState && !isPreviewUnavailableState(preview)) {
            return preview;
          }
          renderPreview(preview);
          if (!isPreviewUnavailableState(preview)) {
            const restored = await restoreJoinedState();
            if (!restored) {
              clearJoinedState();
            }
          }
          return preview;
        }

        setPreviewUnavailable("We couldn’t load the invite preview right now.");
        return null;
      } catch (error) {
        console.error("[join debug] preview load error", {
          code: error?.code,
          message: error?.message,
          details: error?.details
        });
        setPreviewUnavailable("We couldn’t load the invite preview right now.");
        return null;
      }
    }

    joinButton.addEventListener("click", async function () {
      const displayName = displayNameInput.value.trim();
      if (displayName.length < 1 || displayName.length > 40) {
        setJoinMessage("Please enter a display name between 1 and 40 characters.", true);
        return;
      }

      if (!auth || !functions) {
        console.error("[join debug] join handler unavailable", {
          code: "auth-or-functions-not-ready",
          message: "Auth or functions not initialized",
          details: "auth=" + Boolean(auth) + ", functions=" + Boolean(functions)
        });
        setJoinMessage("Joining is unavailable right now.", true);
        setDebugStatus("auth-or-functions-not-ready", "Auth or Functions was not initialized.");
        return;
      }

      joinButton.disabled = true;
      joinButton.textContent = "Joining...";
      setJoinMessage("Joining this hangout...");

      try {
        if (!auth.currentUser) {
          await signInAnonymously(auth);
        }

        console.log("[join debug] auth.currentUser after signInAnonymously:", Boolean(auth.currentUser));

        const joinHangout = httpsCallable(functions, "joinHangout");
        const result = await joinHangout({
          hangoutId,
          inviteToken,
          displayName
        });

        if (result?.data?.ok) {
          showJoinedState();
        } else {
          throw new Error("Join failed");
        }
      } catch (error) {
        console.error("[join debug] joinHangout error", {
          code: error?.code,
          message: error?.message,
          details: error?.details
        });
        setJoinMessage("Couldn’t join this hangout. The invite may have expired or already been used.", true);
        setDebugStatus(error?.code || "join-failed", error?.message || "Join attempt failed.");
      } finally {
        joinButton.disabled = false;
        joinButton.textContent = "Join";
      }
    });

    statusButtons.forEach((button) => {
      button.addEventListener("click", async function () {
        const status = button.dataset.status;
        if (!auth || !functions || !hangoutId) {
          setStatusMessage("Couldn’t update your status right now.", true);
          return;
        }

        statusButtons.forEach((candidate) => {
          candidate.disabled = true;
        });
        setStatusMessage("Updating your status...");

        try {
          const updateParticipantStatus = httpsCallable(functions, "updateParticipantStatus");
          const result = await updateParticipantStatus({
            hangoutId,
            status
          });

          if (result?.data?.ok) {
            currentBrowserParticipantStatus = status;
            setSelectedStatus(status);
            setStatusMessage("Status updated.");
          } else {
            throw new Error("Status update failed");
          }
        } catch (error) {
          console.error("[join debug] updateParticipantStatus error", {
            code: error?.code,
            message: error?.message,
            details: error?.details
          });

          if (isInactiveHangoutError(error)) {
            const refreshedPreview = await loadPreview({ preserveCurrentState: true });
            if (isPreviewUnavailableState(refreshedPreview)) {
              setStatusMessage("");
              return;
            }
          }

          setStatusMessage("Couldn’t update your status right now.", true);
        } finally {
          statusButtons.forEach((candidate) => {
            candidate.disabled = false;
          });
        }
      });
    });

    setJoinControlsVisible(false);
    joinedState.hidden = true;
    statusSection.hidden = true;
    setOpenAppLink();
    loadPreview();
  </script>
</body>
</html>
